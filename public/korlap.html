<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fiktív kórlap PDF generátor</title>

  <!-- jsPDF CDN -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="script.js"></script>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
    .wrap { max-width: 900px; margin: 0 auto; }
    button { padding: 12px 16px; font-size: 16px; cursor: pointer; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 16px; margin-top: 16px; }
    code { background: #f6f6f6; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Fiktív kórlap PDF generátor</h1>
    <p>Gombnyomásra letölti a <b>fiktív</b> kórlapot PDF-ben (UTF-8 ékezetekkel, Roboto fonttal).</p>

    <button id="btnPdf">Fiktív kórlap letöltése (PDF)</button>

    <div class="card">
      <b>Megjegyzés</b>
      <p>
        A Roboto fontot innen tölti le: <code>cdnjs.cloudflare.com</code>.
        Ha nincs net / tiltva van a fetch, akkor az alap fonttal próbálkozik (ékezetek lehet hibásak).
      </p>
    </div>
  </div>



</body>
</html>
