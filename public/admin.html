<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Rubik betűtípus -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="script.js"></script>
    <title>Admin felület</title>
</head>
<body onload="menukitolt()">

    <!-- Hamburger menü -->
    <div class="overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Menü -->
    <div class="sidebar p-3" id="sidebar">
        <div id="felirat" class="h3 mt-2 mb-5 sm-4">TÁBLÁZATOK</div>
    </div>

    <!-- x... -->
    <div class="content-container">
        <!-- Felsőléc és Hamburger menü -->
        <div class="felsolec my-3 mx-4">
            <!-- Hamburger menü -->
            <button type="button" id="btn_hamburger" class="hamburger-btn text-white" onclick="toggleSidebar()" aria-label="Menü megnyitása">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-list" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M2.5 12.5A.5.5 0 0 1 3 12h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-5A.5.5 0 0 1 3 7h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-5A.5.5 0 0 1 3 2h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
                </svg>
            </button>
            <!-- Kereső -->
            <input id="kereso" type="search" class="form-control" onkeyup="keres()" placeholder="Keresés...">
            <!-- Plusz gomb -->
            <button type="button" id="btn_plus" class="btn mx-3 btn_letrehoz_szin" data-bs-toggle="modal" data-bs-target="#adatad" onclick="pupUPletrehoz('gomb')">
                <img id="btn_plus_icon" src="kepek/plusicon.svg" alt="Jelszó mutatása/elrejtése" style="height: 60%;">
            </button>
            <!-- Profil -->
            <div id="box_profil">
                <p class="txt_profil" id="txt_felhasznalo"></p>
                <p class="txt_profil" id="txt_jogosultsag"></p>
            </div>
            <!-- Kijelentkezés gomb -->
            <button onclick="iHopeLoginOut()" id="btn_logout" class="btn mx-3 btn_torles_szin">
                <img id="btn_logout_icon" src="kepek/logouticon.svg" alt="Jelszó mutatása/elrejtése" style="height: 60%;">
            </button>
            <!-- Mobilos nézet -->
            <div class="mobile">
                <input id="mobile_kereso" type="search" class="form-control" onkeyup="keres()" placeholder="Keresés...">
                <button type="button" id="btn_mobile_plus" class="btn btn_letrehoz_szin" data-bs-toggle="modal" data-bs-target="#adatad" onclick="pupUPletrehoz('gomb')">
                    <img id="btn_plus_icon" src="kepek/plusicon.svg" alt="Jelszó mutatása/elrejtése" style="height: 60%;">
                </button>
                <button id="btn_profile" class="btn btn_torles_szin">
                    <img id="btn_profile_icon" src="kepek/profileicon.svg" alt="Jelszó mutatása/elrejtése" style="height: 60%;">
                </button>
            </div>
        </div>

        <!-- Tartalom -->
        <div class="tablakIdeTolt" id="sav"></div>
    </div>


    <!-- Modal ablak létrehozás és szerkesztéshez   -->
    
    <div class="modal fade" id="adatad" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable modal-fullscreen-sm-down">
            <div class="modal-content">
                <div id="letrehozAblak">
                    <button type="button" class="btn-close position-absolute top-0 end-0 m-3  btn-close-white" data-bs-dismiss="modal" aria-label="Bezárás"></button>
                    <div id="idebeteszt">Some text in the Modal..</div>
                </div>
            </div>
        </div>
    </div>
    
   
    
</body>
</html>
