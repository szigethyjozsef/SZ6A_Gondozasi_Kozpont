    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<body onload="menukitolt()">

  <!-- Overlay for mobile -->
  <div class="overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <div class="sidebar bg-dark text-white p-3" id="sidebar">
    <h4>Menü</h4>
    <a href="#" class="nav-link" data-page="home">Főoldal</a>
    <a href="#" class="nav-link" data-page="fonts">Betűtípusok</a>
    <a href="#" class="nav-link" data-page="settings">Beállítások</a>
    <a href="#" class="nav-link" data-page="contact">Kapcsolat</a>
  </div>

  <!-- Main content -->
  <div class="content-container">
    <!-- Search bar + Hamburger -->
    <div class="search-bar">
      <form>
        <button type="button" class="hamburger-btn text-white" onclick="toggleSidebar()" aria-label="Menü megnyitása">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="currentColor" class="bi bi-list" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M2.5 12.5A.5.5 0 0 1 3 12h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-5A.5.5 0 0 1 3 7h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5zm0-5A.5.5 0 0 1 3 2h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5z"/>
          </svg>
        </button>
        <input type="search" class="form-control" placeholder="Keresés...">
      </form>
    </div>

    <!-- Tartalom -->
    <div class="scrollable-content">
      <h2>Főoldal</h2>
      <p>Üdvözlünk az admin felületen!</p>
    </div>
  </div>
