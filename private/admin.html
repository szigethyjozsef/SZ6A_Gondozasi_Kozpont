<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- jsPDF könyvtár -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Bootstrap JS és jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Rubik betűtípus -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="script.js"></script>
    <title>Admin felület</title>
</head>
<body onload="menukitolt()">

    <script>
        // Ez a függvény folyamatosan figyeli, hogy kidobtak-e
        setInterval(async () => {
            try {
                const response = await fetch('/check-admin-status');
                if (response.status === 401) {
                    alert("Egy másik admin belépett, téged kijelentkeztettünk!");
                    window.location.href = "/";
                }
            } catch (err) {
                console.error("Szerver ellenőrzési hiba.");
            }
        }, 5000); // 5 másodpercenként csekkol
    </script>
    
    <!-- Hamburger menü -->
    <div class="overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Menü -->
    <div class="sidebar p-3" id="sidebar">
        <div id="felirat" class="h3 mt-2 mb-5 sm-4">TÁBLÁZATOK</div>
    </div>

    <!-- x... -->
    <div class="content-container10">
        <!-- Felsőléc és Hamburger menü -->
        <div id="nagy_felsolec" class="felsolec">
            <!-- Kereső -->
            <input id="kereso" type="search" class="form-control" oninput="keres()" placeholder="Keresés...">
            <!-- Plusz gomb -->
            <div id="gep_plus">
            </div>
            <!-- Profil -->
            <div id="box_profil">
                <p class="txt_profil" id="txt_felhasznalo"></p>
                <p class="txt_profil txt_jogosult" id="txt_jogosultsag"></p>
            </div>
            <!-- Kijelentkezés gomb -->
            <button onclick="iHopeLoginOut()" id="btn_logout" class="red_btn btn mx-3">
                <img id="btn_logout_icon" src="kepek/logouticon.svg" alt="Jelszó mutatása/elrejtése" style="height: 60%;">
            </button>
            <!-- Mobilos nézet -->
            <div class="mobile">
                <!-- Hamburger menü -->
                <button type="button" id="btn_hamburger" class="blue_btn btn" onclick="toggleSidebar()" aria-label="Menü megnyitása">
                    <img id="btn_hamburger_icon" src="kepek/burgericon.svg" alt="Menü" style="height: 60%;">
                </button>
                <input id="mobile_kereso" type="search" class="form-control" oninput="keres()" placeholder="Keresés...">
                <div id="mobile_plus">
                </button>
                </div>
                <div class="dropdown" >
                    <button id="btn_profile" class="red_btn btn dropbtn"  onclick="toggleMenu()">
                        <img id="btn_profile_icon" src="kepek/profileicon.svg" alt="Profile" style="height: 60%;">
                    </button>
                    
                    <div id="myDropdown" class="dropdown-panel">
                        <div class="profil-sor">
                            <div class="avatar-kor" id="avatar_betu"></div> 
                            
                            <div class="profil-szovegek">
                                <p class="txt_profil" id="txt_felhasznalo_m"></p>
                                <p class="txt_profil txt_jogosult" id="txt_jogosultsag_m"></p>
                            </div>
                        </div>
                        
                        <div id="leug-vonal"></div>
                        
                        <button class="leug-gomb" onclick="iHopeLoginOut()" id="btn_kijelentkezes">
                            <svg class="leug-ikon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M15 16.5V19C15 20.1046 14.1046 21 13 21H6C4.89543 21 4 20.1046 4 19V5C4 3.89543 4.89543 3 6 3H13C14.1046 3 15 3.89543 15 5V8.0625M11 12H21M21 12L18.5 9.5M21 12L18.5 14.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <!-- <img src="kepek/logouticon.svg" alt="Logout" class="leug-ikon"> -->
                            <span class="leug-szoveg">Kijelentkezés</span>
                        </button>
                    </div>
                    
                </div>
            </div>
        </div>

        <img src="" alt="">

        <!-- Tartalom -->
             <div id="kor">
            </div>
        <div class="tablakIdeTolt" id="sav"></div>
    </div>


    <div id="snackbar"></div>

    
    <div class="modal fade" id="adatad">
    <div class="modal-dialog modal-dialog-centered modal-md modal-dialog-scrollable modal-fullscreen-sm-down">
      <div class="modal-content">
        <div class="modal-header">
            <div id="cimHelye"></div>
            <button type="button" class="btn-close position-absolute top-0 end-0 m-3  btn-close-white" data-bs-dismiss="modal" aria-label="Bezárás"></button>
        </div>
        <div class="modal-body">
            <div id="idebeteszt">Some text in the Modal..</div> 
        </div>
        <div class="modal-footer" id="gombokHelye">
            
        </div>
    </div>
  </div>
</body>



</html>
